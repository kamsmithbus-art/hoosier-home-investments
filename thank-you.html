<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Thank You | Hoosier Home Investments</title>
  <style>
    :root { --navy:#071f3d; --gold:#c7973a; --white:#fff; --light:#f6f6f3; --text:#152033; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:Arial,sans-serif; color:var(--text); background:var(--light); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { max-width:720px; background:var(--white); border-radius:16px; padding:44px; text-align:center; border-top:6px solid var(--gold); box-shadow:0 10px 30px rgba(0,0,0,.08); }
    h1 { color:var(--navy); font-size:40px; margin-bottom:14px; }
    p { font-size:18px; margin-bottom:22px; }
    a { display:inline-block; background:var(--gold); color:var(--navy); padding:13px 22px; border-radius:6px; text-decoration:none; font-weight:800; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank You</h1>
    <p>Your property information has been submitted to Hoosier Home Investments. We will review your details and follow up with you soon.</p>
    <a href="https://hoosierhomeinvestments.co/">Back to Home</a>
  </div>
</body>
</html>
